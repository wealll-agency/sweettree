# NGINX Configuration for Sweettree E-commerce
# Place this in /etc/nginx/sites-available/sweettree and symlink to sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name sweettreeon.com www.sweettreeon.com;

    # Redirect all HTTP requests to canonical HTTPS
    return 301 https://www.sweettreeon.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sweettreeon.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/sweettreeon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweettreeon.com/privkey.pem;

    # Redirect non-www HTTPS to canonical www HTTPS
    return 301 https://www.sweettreeon.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sweettreeon.com;

    # SSL Certificates (Update paths during actual deployment)
    ssl_certificate /etc/letsencrypt/live/sweettreeon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweettreeon.com/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # GZIP Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_comp_level 6;
    gzip_min_length 1000;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Backend API Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:7050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Next.js Proxy
    location / {
        proxy_pass http://127.0.0.1:7051;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Uploads Proxy
    location /uploads/ {
        proxy_pass http://127.0.0.1:7050/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
